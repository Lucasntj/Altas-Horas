databases:
  - name: altas-horas-db
    plan: free
    databaseName: altashorasdb
    user: altashoras

services:
  - type: web
    name: altas-horas-catalogo
    runtime: node
    rootDir: .
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: STORE_TIMEZONE
        value: America/Sao_Paulo
      - key: STORE_OPEN_HOUR
        value: "18"
      - key: STORE_CLOSE_HOUR
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: altas-horas-db
          property: connectionString
